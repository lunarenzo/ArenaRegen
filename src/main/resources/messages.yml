# English messages for the ArenaRegen plugin
messages:
  incorrect-syntax: "&cUnknown arguments. Type &e\"/arenaregen help\" &cto see usages."
  no-permission: "&cYou do not have permission to run this command."
  only-for-players: "&cOnly players can use this command."
  region-exists: "&cA region with this name already exists."
